<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>秘密客評分表</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div class="brand-row">
          <div class="brand-mark">鍋</div>
          <div>
            <p class="eyebrow">秘密客任務</p>
            <h1>門市體驗評分表</h1>
          </div>
        </div>
        <div class="score-panel">
          <span>目前總分</span>
          <strong id="totalScore">0.0</strong>
          <small id="scoreLevel">尚未完成</small>
        </div>
      </header>

      <form id="scoreForm" class="form">
        <section class="section">
          <div class="section-head">
            <h2>基本資料</h2>
            <span>必填</span>
          </div>
          <div class="field-grid">
            <label>
              門市
              <select id="storeName" required>
                <option value="">請選擇門市</option>
                <option>台北八德店</option>
                <option>台北長安東店</option>
                <option>新北永和中正店</option>
                <option>台中漢口店</option>
                <option>台中青海店</option>
              </select>
            </label>
            <label>
              用餐日期
              <input id="visitDate" type="date" required />
            </label>
            <label>
              用餐時段
              <select id="visitPeriod" required>
                <option>午餐</option>
                <option>晚餐</option>
                <option>宵夜</option>
              </select>
            </label>
            <label>
              用餐人數
              <input id="guestCount" type="number" min="1" max="8" value="2" required />
            </label>
            <label>
              秘密客代號
              <input id="shopperCode" type="text" placeholder="例如 MS-042" required />
            </label>
            <label>
              帳單金額
              <input id="billAmount" type="number" min="0" step="1" placeholder="例如 1280" required />
            </label>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>評分項目</h2>
            <span>0-5 分</span>
          </div>
          <p class="section-note">0 分代表完全未執行，5 分代表完全符合標準。請依實際觀察給分。</p>
          <div id="scoreItems" class="score-items"></div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>顧客可見衛生與安全</h2>
            <span>勾選觀察</span>
          </div>
          <div class="check-list">
            <label><input type="checkbox" name="visibleSafety" /> 桌面無油膩、菜渣、水漬</label>
            <label><input type="checkbox" name="visibleSafety" /> 餐具無水痕、破損、異味</label>
            <label><input type="checkbox" name="visibleSafety" /> 醬料區補齊且無明顯滴漏</label>
            <label><input type="checkbox" name="visibleSafety" /> 廁所無異味且衛生紙、洗手乳充足</label>
            <label><input type="checkbox" name="visibleSafety" /> 顧客動線地板無濕滑或障礙物</label>
            <label><input type="checkbox" name="visibleSafety" /> 員工有提醒爐具、熱湯或兒童安全</label>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>一票否決</h2>
            <span>若有請勾</span>
          </div>
          <p class="section-note">若發生以下任一項，即使總分高，也會由總部列為需複查案件。</p>
          <div class="danger-list">
            <label><input type="checkbox" name="critical" /> 食材明顯不新鮮或有異物</label>
            <label><input type="checkbox" name="critical" /> 餐具或鍋具明顯髒污仍提供使用</label>
            <label><input type="checkbox" name="critical" /> 員工粗魯爭辯或冷處理客訴</label>
            <label><input type="checkbox" name="critical" /> 帳單金額錯誤且未主動修正</label>
            <label><input type="checkbox" name="critical" /> 爐具、瓦斯、電線有安全疑慮</label>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>照片與帳單</h2>
            <span>帳單必填</span>
          </div>
          <p class="section-note">請正常消費並付款，拍下帳單上傳；總部審核後再進行消費核銷。</p>
          <div class="upload-grid">
            <label class="upload-card required-card">
              <strong>帳單照片</strong>
              <input type="file" accept="image/*" capture="environment" data-preview="receiptPreview" required />
              <output id="receiptPreview"></output>
            </label>
            <label class="upload-card">
              <strong>鍋物 / 餐點照片</strong>
              <input type="file" accept="image/*" capture="environment" data-preview="mealPreview" />
              <output id="mealPreview"></output>
            </label>
            <label class="upload-card">
              <strong>桌面 / 醬料區照片</strong>
              <input type="file" accept="image/*" capture="environment" data-preview="areaPreview" />
              <output id="areaPreview"></output>
            </label>
            <label class="upload-card">
              <strong>異常佐證照片</strong>
              <input type="file" accept="image/*" capture="environment" data-preview="issuePreview" />
              <output id="issuePreview"></output>
            </label>
          </div>
        </section>

        <section class="section">
          <div class="section-head">
            <h2>文字備註</h2>
            <span>具體描述</span>
          </div>
          <label class="wide-label">
            優點
            <textarea id="goodNotes" rows="3" placeholder="例如：外場主動加湯，結帳時有清楚說明會員優惠。"></textarea>
          </label>
          <label class="wide-label">
            需改善
            <textarea id="badNotes" rows="4" placeholder="例如：醬料區花生粉缺補超過 10 分鐘，入座時未提醒爐具安全。"></textarea>
          </label>
        </section>

        <section class="summary-bar" aria-label="送出摘要">
          <div>
            <span>送出前確認</span>
            <strong id="submitSummary">總分 0.0｜未勾一票否決</strong>
          </div>
          <button type="submit">送出評分</button>
        </section>
      </form>
    </main>

    <dialog id="submittedDialog">
      <div class="dialog-card">
        <p class="eyebrow">已建立送出紀錄</p>
        <h2>評分表已送出</h2>
        <p id="submittedText">總部將審核帳單與照片後進行核銷。</p>
        <button id="closeDialog" type="button">完成</button>
      </div>
    </dialog>

    <script src="./config.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
